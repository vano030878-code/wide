<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" charset="UTF-8" content="notranslate">
        <title>profile</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header>
        <div id="menu-container"></div>
        </header>
        <main>
    <div class="main_profile">
        <form id="adForm">
        <div class="phone_title">
        <input type="text" id="title" placeholder="Заголовок" required>
        <input type="text" id="contact" placeholder="Контакт (email, телефон...)" required>
        </div>
        <textarea id="description" placeholder="Описание" rows="3" required></textarea>

        <h3>Как заполнять описание? Советы:</h3>
        <div class="recommends">
            <p>Кто ищет? – представь себя.<br>
        Что нужно сделать? – перечисли ключевые задачи.<br>
        Чем вы готовы помочь? – опыт, ресурсы, идеи.<br>
        Пример: «Я студент, делаю приложение для учёта задач. Нужен фронтенд-разработчик (React) на 2–3 часа в неделю. Могу помочь с бэкендом».</p>
        </div>

        <div class="insert_file">
            <input type="file" id="projectImage" accept="image/*">
            <label for="projectImage" class="label_file">Выбрать изображение</label>
        </div>
        
        <button type="submit">Добавить объявление</button>
        </form>
    </div>   
    <script>
    // --- Обработка формы ---
    document.getElementById('adForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Отменяем перезагрузку страницы

        // 1. Собираем данные из полей
        let title = document.getElementById('title').value.trim();
        let description = document.getElementById('description').value.trim();
        let contact = document.getElementById('contact').value.trim();
        let fileInput = document.getElementById('projectImage');
        let file = fileInput.files[0];

        if (!title || !description || !contact) {
            alert('Заполните все поля!');
            return;
        }

        // 2. Функция, которая отправляет данные в Python (наш API)
        async function sendAdToPython(imageData = null) {
            const adData = {
                title: title,
                description: description,
                contact: contact,
                image: imageData
            };

            try {
                // Отправляем POST-запрос на наш сервер
                const response = await fetch('http://127.0.0.1:5000/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(adData) // Превращаем объект в строку JSON
                });

                if (response.ok) {
                    alert('Объявление успешно добавлено в базу данных!');
                    document.getElementById('adForm').reset();
                    // Если хочешь, чтобы после отправки сразу перекидывало на ленту:
                    // window.location.href = 'announce.html';
                } else {
                    const errData = await response.json();
                    alert('Ошибка сервера: ' + (errData.error || 'Неизвестная ошибка'));
                }
            } catch (error) {
                console.error('Ошибка связи:', error);
                alert('Не удалось связаться с сервером. Проверь, запущен ли Python!');
            }
        }

        // 3. Логика обработки картинки (если она выбрана)
        if (file) {
            let reader = new FileReader();
            reader.onload = function(event) {
                // Когда картинка прочитана в base64, запускаем отправку
                sendAdToPython(event.target.result);
            };
            reader.readAsDataURL(file);
        } else {
            // Если картинки нет, отправляем с null
            sendAdToPython(null);
        }
    });
</script>
        <div id="footer-container"></div>
        </main>
        <script src="ads.js"></script>
    </body>
</html>
